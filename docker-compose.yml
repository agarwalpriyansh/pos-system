version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: pos-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - pos-network

volumes:
  redis-data:

networks:
  pos-network:
    driver: bridge

